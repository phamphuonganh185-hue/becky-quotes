<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cục dàng Becky Cannes - Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary-color: #ff85a2;
            --bg-color: #fffafb;
            --text-color: #333;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', Times, serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 15px;
            margin: 0;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-align: center;
            font-style: italic;
        }

        p.guide {
            font-size: 0.85rem;
            color: #999;
            margin-bottom: 25px;
            font-family: sans-serif;
        }

        #container {
            width: 100%;
            max-width: 600px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
        }

        .quote-card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 4px solid var(--primary-color);
            font-size: 1rem;
            line-height: 1.4;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .quote-card:hover {
            background-color: #fff0f3;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 133, 162, 0.2);
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.8);
            pointer-events: none;
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 50px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            font-size: 0.9rem;
            font-family: sans-serif;
        }

        #toast.show {
            visibility: visible;
            animation: fadeInOut 2.5s;
        }

        @keyframes fadeInOut {
            0% { opacity: 0; bottom: 0; }
            20% { opacity: 1; bottom: 30px; }
            80% { opacity: 1; bottom: 30px; }
            100% { opacity: 0; bottom: 0; }
        }
    </style>
</head>
<body>

    <h1>✨🦦 Becky - Cannes🪽✨</h1>
    <p class="guide">Chạm để copy • Câu đã chọn sẽ tự ẩn với mọi người • 10s web sẽ reload realtime</p>
    <p class="guide">👉SAU KHI ẤN VÀO KHUNG CHỈ CẦN MỞ IG LÊN VÀ PASTE (DÁN) VÀO CMT BÀI VIẾT CỦA BECKY👈</p>

    <div id="container">
        <p style="text-align: center; color: #ccc;">Đang tải dữ liệu...</p>
    </div>

    <div id="toast">ĐÃ COPY VÀO BỘ NHỚ! 🦦🪽</div>

    <script>
        // Cấu hình thông số từ Supabase của bạn
        const SUPABASE_URL = 'https://xrhrgcxqpboytnfqfqdm.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_a-kznHocs7xVrxkkWZ74VQ_IAimWXwC';
        
        const _client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadQuotes() {
            // Lấy dữ liệu từ bảng 'thu', lọc những câu chưa dùng (is_used = false)
            const { data, error } = await _client
                .from('thu')
                .select('*')
                .eq('is_used', false)
                .order('STT', { ascending: true });

            if (error) {
                console.error('Lỗi tải dữ liệu:', error.message);
                return;
            }
            renderUI(data);
        }

        function renderUI(data) {
            const container = document.getElementById('container');
            container.innerHTML = ''; 

            if (!data || data.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999; margin-top: 20px;">Hết lời khen rồi bà ơi! ✨</p>';
                return;
            }
            
            data.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'quote-card';
                // Sử dụng chính xác tên cột "Câu khen ngợi"
                card.innerText = item['Câu khen ngợi']; 

                card.onclick = async function() {
                    // Cập nhật is_used = true dựa trên STT (Primary Key)
                    const { error } = await _client
                        .from('thu')
                        .update({ is_used: true })
                        .eq('STT', item.STT);

                    if (!error) {
                        // Sao chép vào clipboard
                        navigator.clipboard.writeText(item['Câu khen ngợi']);
                        
                        // Hiển thị toast và hiệu ứng ẩn
                        const toast = document.getElementById('toast');
                        toast.className = "show";
                        setTimeout(() => { toast.className = ""; }, 2500);
                        
                        card.classList.add('fade-out');
                        setTimeout(() => card.remove(), 400);
                    } else {
                        console.error("Lỗi khi cập nhật:", error.message);
                        alert("Có lỗi xảy ra, thử lại sau nhé!");
                    }
                };
                container.appendChild(card);
            });
        }

        // Tải dữ liệu khi vừa vào trang
        loadQuotes();

        // Tự động làm mới danh sách mỗi 10 giây để đồng bộ giữa các người dùng
        setInterval(loadQuotes, 10000);
    </script>
</body>
</html>
